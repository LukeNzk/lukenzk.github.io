{% extends "base.html" %}
{% block title %}{{ post.title }}{% endblock %}

{% block content %}
<article>
  <header class="mb-5">
    <a class="back-link" href="{{ site_root }}">&#x2190; All posts</a>
    <h1 class="fw-bold mt-3 mb-2">{{ post.title }}</h1>
    <div class="d-flex align-items-center gap-3 flex-wrap">
      <span class="post-meta">{{ post.date }}</span>
      <span class="post-meta">{{ post.read_time }} min</span>

      {% for tag in post.tags %}
      <span class="badge tag-badge">{{ tag }}</span>
      {% endfor %}
    </div>
  </header>
  <div class="post-content">
    {{ post.content | safe }}
  </div>
</article>
{% endblock %}
